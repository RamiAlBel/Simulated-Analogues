<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CD Baby Distribution Partners</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 48px 24px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header img.logo {
      width: 160px;
      margin-bottom: 20px;
      filter: brightness(0) invert(1);
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    header p {
      margin-top: 10px;
      color: #888;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      text-decoration: none;
      color: #ccc;
      font-size: 0.78rem;
      font-weight: 500;
      text-align: center;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      background: #222;
      border-color: #444;
      color: #fff;
    }

    .card img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    /* Fallback badge for platforms without icons */
    .badge {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <h1>CD Baby Distribution Partners</h1>
  <p>Music distributed to 150+ platforms worldwide</p>
</header>

<div class="grid" id="grid"></div>

<script>
  const platforms = [
    { name: "Spotify",            icon: "spotify",          color: "#1DB954" },
    { name: "Apple Music",        icon: "applemusic",       color: "#FC3C44" },
    { name: "YouTube Music",      icon: "youtubemusic",     color: "#FF0000" },
    { name: "Amazon Music",       icon: "amazonmusic",      color: "#00A8E1" },
    { name: "TikTok",             icon: "tiktok",           color: "#010101" },
    { name: "Pandora",            icon: "pandora",          color: "#3668FF" },
    { name: "Deezer",             icon: "deezer",           color: "#FEAA2D" },
    { name: "TIDAL",              icon: "tidal",            color: "#1DB4C2" },
    { name: "iHeartRadio",        icon: "iheartradio",      color: "#C6002B" },
    { name: "Shazam",             icon: "shazam",           color: "#0088FF" },
    { name: "Qobuz",              icon: "qobuz",            color: "#009EE0" },
    { name: "7digital",           icon: "7digital",         color: "#E3001B" },
    { name: "Boomplay",           icon: "boomplay",         color: "#FF6B2C" },
    { name: "KKBox",              icon: "kkbox",            color: "#33D65F" },
    { name: "Tencent Music",      icon: "tencentqq",        color: "#12B7F5" },
    { name: "NetEase Music",      icon: "neteasecloudmusic",color: "#C20C0C" },
    { name: "Anghami",            icon: "anghami",          color: "#F53B6E" },
    { name: "JioSaavn",           icon: "jiosaavn",         color: "#2BC5B4" },
    { name: "Peloton",            icon: "peloton",          color: "#FC4C02" },
    { name: "Hungama",            fallback: "HU",           color: "#E31837" },
    { name: "AWA",                fallback: "AW",           color: "#000000" },
    { name: "Claro Música",       fallback: "CM",           color: "#DA291C" },
    { name: "Nuuday",             fallback: "NU",           color: "#5C2D91" },
    { name: "Tuned Global",       fallback: "TG",           color: "#1A73E8" },
    { name: "Kuack",              fallback: "KU",           color: "#FF4500" },
    { name: "Audible Magic",      fallback: "AM",           color: "#333333" },
    { name: "Slacker Radio",      fallback: "SR",           color: "#0079C1" },
    { name: "InProdicon",         fallback: "IP",           color: "#004080" },
    { name: "Kdigital",           fallback: "KD",           color: "#006633" },
    { name: "Trebel",             fallback: "TR",           color: "#FF3B5C" },
    { name: "AMI Entertainment",  fallback: "AMI",          color: "#C8962E" },
    { name: "Lissen",             fallback: "LI",           color: "#6C3FC5" },
  ];

  const SIMPLEICONS_CDN = "https://cdn.simpleicons.org/";
  const grid = document.getElementById("grid");

  platforms.forEach(p => {
    if (p.skip) return;

    const a = document.createElement("a");
    a.className = "card";
    a.href = "https://www.google.com";
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    let iconEl;
    if (p.icon) {
      iconEl = document.createElement("img");
      // Use white version of the icon on dark background via /ffffff
      iconEl.src = `${SIMPLEICONS_CDN}${p.icon}/ffffff`;
      iconEl.alt = p.name;
      iconEl.onerror = function () {
        // Fallback to colored badge if icon fails to load
        const badge = document.createElement("div");
        badge.className = "badge";
        badge.style.background = p.color;
        badge.textContent = p.name.substring(0, 2).toUpperCase();
        this.replaceWith(badge);
      };
    } else {
      iconEl = document.createElement("div");
      iconEl.className = "badge";
      iconEl.style.background = p.color;
      iconEl.textContent = p.fallback || p.name.substring(0, 2).toUpperCase();
    }

    const label = document.createElement("span");
    label.textContent = p.name;

    a.appendChild(iconEl);
    a.appendChild(label);
    grid.appendChild(a);
  });
</script>

</body>
</html>
